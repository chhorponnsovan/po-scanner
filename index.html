<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-50 p-4 font-sans max-w-md mx-auto">
  <h1 class="text-xl font-bold text-center text-slate-800 mb-4">📦 Warehouse Terminal</h1>

  <div class="flex bg-slate-200 p-1 rounded-lg mb-4">
    <button id="btnPurchase" onclick="setMode('purchase')" class="flex-1 py-2 font-bold rounded-md bg-white shadow-sm text-blue-700">Purchase Mode</button>
    <button id="btnReceive" onclick="setMode('receive')" class="flex-1 py-2 font-bold rounded-md text-slate-600">Receive Mode</button>
  </div>

  <div class="bg-white p-3 rounded-lg shadow-sm border mb-4">
    <div id="reader" class="w-full h-48 bg-slate-100 rounded-lg overflow-hidden"></div>
    <p id="scan-status" class="text-xs text-center text-slate-500 mt-2">Ready to scan</p>
  </div>

  <form id="mainForm" class="bg-white p-4 rounded-xl border space-y-3">
    <input type="text" id="scannedBarcode" readonly placeholder="Barcode" class="w-full p-2 bg-slate-100 border rounded-lg font-mono">
    <input type="text" id="poNumber" placeholder="PO Number" class="w-full p-2 border rounded-lg">
    
    <div id="extraFields" class="space-y-3">
      <input type="text" id="itemName" placeholder="Item Name" class="w-full p-2 border rounded-lg">
      <input type="number" id="qty" placeholder="Quantity" class="w-full p-2 border rounded-lg">
    </div>
    
    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Confirm Purchase</button>
  </form>

  <script>
    const API_URL = "PASTE_YOUR_WEB_APP_URL_HERE";
    let currentMode = 'purchase';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btnPurchase').className = mode === 'purchase' ? 'flex-1 py-2 font-bold rounded-md bg-white shadow-sm text-blue-700' : 'flex-1 py-2 font-bold rounded-md text-slate-600';
      document.getElementById('btnReceive').className = mode === 'receive' ? 'flex-1 py-2 font-bold rounded-md bg-white shadow-sm text-blue-700' : 'flex-1 py-2 font-bold rounded-md text-slate-600';
      document.getElementById('extraFields').classList.toggle('hidden', mode !== 'purchase');
      document.getElementById('submitBtn').innerText = mode === 'purchase' ? "Confirm Purchase" : "Confirm Receipt";
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (text) => {
      document.getElementById('scannedBarcode').value = text;
      document.getElementById('scan-status').innerText = "Scanned: " + text;
    });

    document.getElementById('mainForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        action: currentMode,
        scannedBarcode: document.getElementById('scannedBarcode').value,
        poNumber: document.getElementById('poNumber').value,
        itemName: document.getElementById('itemName').value,
        receivedQty: document.getElementById('qty').value,
        qty: document.getElementById('qty').value
      };
      const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
      alert(res.message);
    });
  </script>
</body>
</html>
