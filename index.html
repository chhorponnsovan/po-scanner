<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-50 p-4 font-sans max-w-md mx-auto">

  <h1 class="text-xl font-bold text-center text-slate-800 mb-4">📦 Warehouse Terminal</h1>

  <div class="flex bg-slate-200 p-1 rounded-lg mb-4">
    <button id="btnVerify" onclick="setMode('verify')" class="flex-1 py-2 text-sm font-bold rounded-md bg-white shadow-sm text-blue-700">Verify PO</button>
    <button id="btnReceive" onclick="setMode('receive')" class="flex-1 py-2 text-sm font-bold rounded-md text-slate-600">Receive Item</button>
  </div>

  <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 mb-4">
    <div id="reader" class="w-full bg-slate-100 rounded-lg overflow-hidden"></div>
    <p id="scan-status" class="text-xs text-center text-slate-500 mt-2">Mode: Verification</p>
  </div>

  <form id="receivingForm" class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-4">
    <div>
      <label class="block text-xs font-semibold text-slate-600 uppercase">Scanned Barcode</label>
      <input type="text" id="scannedBarcode" readonly required class="w-full mt-1 p-2.5 bg-slate-100 border border-slate-300 rounded-lg font-mono">
    </div>
    
    <div id="resultBox" class="hidden p-3 bg-blue-50 text-blue-800 text-xs rounded-lg font-medium text-center"></div>

    <button type="submit" id="submitBtn" disabled class="w-full bg-slate-400 text-white font-semibold py-3 rounded-lg cursor-not-allowed">
      Scan Code First
    </button>
  </form>

  <script>
    const API_URL = "YOUR_GOOGLE_WEB_APP_URL_HERE"; // <--- REMEMBER TO PASTE YOUR URL
    let currentMode = 'verify';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btnVerify').className = mode === 'verify' ? 'flex-1 py-2 text-sm font-bold rounded-md bg-white shadow-sm text-blue-700' : 'flex-1 py-2 text-sm font-bold rounded-md text-slate-600';
      document.getElementById('btnReceive').className = mode === 'receive' ? 'flex-1 py-2 text-sm font-bold rounded-md bg-white shadow-sm text-blue-700' : 'flex-1 py-2 text-sm font-bold rounded-md text-slate-600';
      document.getElementById('scan-status').innerText = "Mode: " + (mode === 'verify' ? 'Verification' : 'Receiving');
    }

    function onScanSuccess(decodedText) {
      document.getElementById('scannedBarcode').value = decodedText;
      const status = document.getElementById('scan-status');
      
      if (currentMode === 'verify') {
        fetchFromGoogle({ action: "lookup", barcode: decodedText }).then(res => {
          document.getElementById('resultBox').className = res.success ? "block p-3 bg-green-100 text-green-800 text-xs rounded-lg text-center" : "block p-3 bg-red-100 text-red-800 text-xs rounded-lg text-center";
          document.getElementById('resultBox').innerText = res.success ? "PO Found: " + res.poNumber : res.message;
          document.getElementById('resultBox').classList.remove('hidden');
        });
      } else {
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').className = "w-full bg-blue-600 text-white font-semibold py-3 rounded-lg";
        document.getElementById('submitBtn').innerText = "Confirm Receipt";
      }
    }

    async function fetchFromGoogle(payload) {
      const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      return await response.json();
    }

    // Camera Init & Form Logic remains similar to previous version...
  </script>
</body>
</html>
